<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .clock { font-size: 48px; margin: 20px; } 
        .login { font-size: 24px; }
    </style>
</head>
<body>
    <div class="clock" id="clock"></div>
    <div class="login">Current User's Login: ShelksCompa</div>
    <script>
        function updateClock() {
            const now = new Date();
            // Format date as YYYY-MM-DD HH:MM:SS
            const formattedDate = now.toISOString().slice(0, 19).replace('T', ' ');
            document.getElementById('clock').innerText = `Current Date and Time (UTC): ${formattedDate}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); // Initial call to display immediately
    </script>
</body>
</html>
